

services:
  # ---------------------------
  # PostgreSQL database
  # ---------------------------
  db:
    image: postgres:16
    container_name: nba_sentiment_db
    restart: always
    environment:
      POSTGRES_DB: nba_sentiment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/migrations  # so we can run migrations against this container too
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------
  # Scraper service (PRAW)
  # Run on-demand or via cron later — not "always on"
  # ---------------------------
  scraper:
    build: .
    container_name: nba_sentiment_scraper
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: nba_sentiment
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT}
    command: ["python", "scraper/praw_scraper.py"]

  # ---------------------------
  # FastAPI backend
  # Always running, serves the dashboard
  # ---------------------------
  api:
    build: .
    container_name: nba_sentiment_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: nba_sentiment
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
